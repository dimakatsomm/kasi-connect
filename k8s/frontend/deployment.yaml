apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: kasi-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: gar-secret
      containers:
        - name: frontend
          image: FRONTEND_IMAGE # replaced by CI/CD pipeline via sed during deployment
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: frontend-secrets
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
