apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kasi-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: gar-secret
      containers:
        - name: backend
          image: BACKEND_IMAGE # replaced by CI/CD pipeline via sed during deployment
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
