name: Terraform - Huawei Cloud

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options:
          - staging
          - production
        default: staging

permissions:
  contents: read

jobs:
  staging:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/develop') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_environment: staging
      HUAWEICLOUD_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_ACCESS_KEY }}
      HUAWEICLOUD_SECRET_KEY: ${{ secrets.HUAWEICLOUD_SECRET_KEY }}
      TF_VAR_access_key: ${{ secrets.HUAWEICLOUD_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.HUAWEICLOUD_SECRET_KEY }}
      TF_VAR_region: ${{ secrets.HUAWEICLOUD_REGION }}
      TF_VAR_project_id: ${{ secrets.HUAWEICLOUD_PROJECT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.HUAWEICLOUD_SSH_PUBLIC_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Huawei Cloud staging secrets exist
        shell: bash
        run: |
          : "${HUAWEICLOUD_ACCESS_KEY:?Set staging secret HUAWEICLOUD_ACCESS_KEY}"
          : "${HUAWEICLOUD_SECRET_KEY:?Set staging secret HUAWEICLOUD_SECRET_KEY}"
          : "${TF_VAR_ssh_public_key:?Set staging secret HUAWEICLOUD_SSH_PUBLIC_KEY}"
          : "${TF_VAR_region:?Add staging secret HUAWEICLOUD_REGION (region code)}"
          : "${TF_VAR_project_id:?Set staging secret HUAWEICLOUD_PROJECT_ID}"
          : "${TF_STATE_BUCKET:?Set staging secret TF_STATE_BUCKET (OBS bucket for Terraform state)}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform fmt
        shell: bash
        run: terraform fmt -check -recursive

      - name: Ensure Terraform state bucket exists
        shell: bash
        run: |
          export AWS_ACCESS_KEY_ID="${HUAWEICLOUD_ACCESS_KEY}"
          export AWS_SECRET_ACCESS_KEY="${HUAWEICLOUD_SECRET_KEY}"
          OBS_ENDPOINT="https://obs.${TF_VAR_region}.myhuaweicloud.com"
          if aws --endpoint-url "${OBS_ENDPOINT}" s3api head-bucket --bucket "${TF_STATE_BUCKET}" --region "${TF_VAR_region}" >/dev/null 2>&1; then
            echo "Terraform state bucket already exists: ${TF_STATE_BUCKET}"
          else
            echo "Creating Terraform state bucket: ${TF_STATE_BUCKET}"
            aws --endpoint-url "${OBS_ENDPOINT}" s3api create-bucket --bucket "${TF_STATE_BUCKET}" --region "${TF_VAR_region}"
          fi

      - name: Terraform init
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${TF_VAR_region}" \
            -backend-config="endpoints={s3=\"https://obs.${TF_VAR_region}.myhuaweicloud.com\"}" \
            -backend-config="access_key=${HUAWEICLOUD_ACCESS_KEY}" \
            -backend-config="secret_key=${HUAWEICLOUD_SECRET_KEY}"

      - name: Terraform validate
        shell: bash
        run: terraform validate -no-color

      - name: Terraform plan
        shell: bash
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-staging
          path: terraform/tfplan
          retention-days: 7

      - name: Terraform apply
        shell: bash
        run: terraform apply -auto-approve -input=false -no-color tfplan

      - name: Terraform outputs
        id: tf_outputs
        shell: bash
        run: |
          CCE_CLUSTER_ID=$(terraform output -raw cce_cluster_id)
          echo "cce_cluster_id=${CCE_CLUSTER_ID}" >> "$GITHUB_OUTPUT"

    outputs:
      cce_cluster_id: ${{ steps.tf_outputs.outputs.cce_cluster_id }}

  production:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_environment: prod
      HUAWEICLOUD_ACCESS_KEY: ${{ secrets.HUAWEICLOUD_ACCESS_KEY }}
      HUAWEICLOUD_SECRET_KEY: ${{ secrets.HUAWEICLOUD_SECRET_KEY }}
      TF_VAR_access_key: ${{ secrets.HUAWEICLOUD_ACCESS_KEY }}
      TF_VAR_secret_key: ${{ secrets.HUAWEICLOUD_SECRET_KEY }}
      TF_VAR_region: ${{ secrets.HUAWEICLOUD_REGION }}
      TF_VAR_project_id: ${{ secrets.HUAWEICLOUD_PROJECT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.HUAWEICLOUD_SSH_PUBLIC_KEY }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Huawei Cloud production secrets exist
        shell: bash
        run: |
          : "${HUAWEICLOUD_ACCESS_KEY:?Set production secret HUAWEICLOUD_ACCESS_KEY}"
          : "${HUAWEICLOUD_SECRET_KEY:?Set production secret HUAWEICLOUD_SECRET_KEY}"
          : "${TF_VAR_ssh_public_key:?Set production secret HUAWEICLOUD_SSH_PUBLIC_KEY}"
          : "${TF_VAR_region:?Add production secret HUAWEICLOUD_REGION (region code)}"
          : "${TF_VAR_project_id:?Set production secret HUAWEICLOUD_PROJECT_ID}"
          : "${TF_STATE_BUCKET:?Set production secret TF_STATE_BUCKET (OBS bucket for Terraform state)}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform fmt
        shell: bash
        run: terraform fmt -check -recursive

      - name: Ensure Terraform state bucket exists
        shell: bash
        run: |
          export AWS_ACCESS_KEY_ID="${HUAWEICLOUD_ACCESS_KEY}"
          export AWS_SECRET_ACCESS_KEY="${HUAWEICLOUD_SECRET_KEY}"
          OBS_ENDPOINT="https://obs.${TF_VAR_region}.myhuaweicloud.com"
          if aws --endpoint-url "${OBS_ENDPOINT}" s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>&1; then
            echo "Terraform state bucket already exists: ${TF_STATE_BUCKET}"
          else
            echo "Creating Terraform state bucket: ${TF_STATE_BUCKET}"
            aws --endpoint-url "${OBS_ENDPOINT}" s3api create-bucket --bucket "${TF_STATE_BUCKET}"
          fi

      - name: Terraform init
        shell: bash
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=${TF_VAR_region}" \
            -backend-config="endpoints={s3=\"https://obs.${TF_VAR_region}.myhuaweicloud.com\"}" \
            -backend-config="access_key=${HUAWEICLOUD_ACCESS_KEY}" \
            -backend-config="secret_key=${HUAWEICLOUD_SECRET_KEY}"

      - name: Terraform validate
        shell: bash
        run: terraform validate -no-color

      - name: Terraform plan
        shell: bash
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-production
          path: terraform/tfplan
          retention-days: 7

      - name: Terraform apply
        shell: bash
        run: terraform apply -auto-approve -input=false -no-color tfplan

      - name: Terraform outputs
        id: tf_outputs
        shell: bash
        run: |
          CCE_CLUSTER_ID=$(terraform output -raw cce_cluster_id)
          echo "cce_cluster_id=${CCE_CLUSTER_ID}" >> "$GITHUB_OUTPUT"

    outputs:
      cce_cluster_id: ${{ steps.tf_outputs.outputs.cce_cluster_id }}
