name: Deploy - GCP Environment

on:
  workflow_call:
    inputs:
      environment:
        description: Target environment (staging or production)
        required: true
        type: string
    secrets:
      GKE_CLUSTER_NAME:
        required: true
      GCP_PROJECT_ID:
        required: true
      GCP_REGION:
        required: true
      GCP_SA_KEY_JSON:
        required: true
      GAR_REPOSITORY:
        required: true
      TF_STATE_BUCKET_GCP:
        required: true
      TF_STATE_PREFIX_GCP:
        required: false
      DB_HOST:
        required: false
      DB_PORT:
        required: false
      DB_NAME:
        required: false
      DB_USER:
        required: false
      DB_PASSWORD:
        required: false
      DATABASE_URL:
        required: false
      REDIS_HOST:
        required: false
      REDIS_PORT:
        required: false
      REDIS_PASSWORD:
        required: false
      KAFKA_BROKERS:
        required: false
      WHATSAPP_PROVIDER:
        required: false
      WHATSAPP_VERIFY_TOKEN:
        required: false
      WHATSAPP_ACCESS_TOKEN:
        required: false
      WHATSAPP_PHONE_NUMBER_ID:
        required: false
      TWILIO_ACCOUNT_SID:
        required: false
      TWILIO_AUTH_TOKEN:
        required: false
      TWILIO_WHATSAPP_FROM:
        required: false
      OBS_BUCKET:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
      GKE_CLUSTER_NAME: ${{ secrets.GKE_CLUSTER_NAME }}
      GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure required secrets exist
        shell: bash
        run: |
          : "${GCP_PROJECT_ID:?GCP_PROJECT_ID is required}"
          : "${GCP_REGION:?GCP_REGION is required}"
          : "${GAR_REPOSITORY:?GAR_REPOSITORY is required}"
          : "${GKE_CLUSTER_NAME:?GKE_CLUSTER_NAME is required}"
          : "${GCP_SA_KEY_JSON:?GCP_SA_KEY_JSON is required}"

          WHATSAPP_PROVIDER_VALUE="${{ secrets.WHATSAPP_PROVIDER }}"
          if [ -z "${WHATSAPP_PROVIDER_VALUE}" ]; then
            WHATSAPP_PROVIDER_VALUE="meta"
          fi
          echo "WHATSAPP_PROVIDER=${WHATSAPP_PROVIDER_VALUE}" >> "$GITHUB_ENV"

          if [ "${WHATSAPP_PROVIDER_VALUE}" = "twilio" ]; then
            if [ -z "${{ secrets.TWILIO_ACCOUNT_SID }}" ] || [ -z "${{ secrets.TWILIO_AUTH_TOKEN }}" ] || [ -z "${{ secrets.TWILIO_WHATSAPP_FROM }}" ]; then
              echo "ERROR: TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN and TWILIO_WHATSAPP_FROM secrets must be set when WHATSAPP_PROVIDER=twilio"
              exit 1
            fi
          else
            if [ -z "${{ secrets.WHATSAPP_VERIFY_TOKEN }}" ] || [ -z "${{ secrets.WHATSAPP_ACCESS_TOKEN }}" ] || [ -z "${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}" ]; then
              echo "ERROR: WHATSAPP_VERIFY_TOKEN, WHATSAPP_ACCESS_TOKEN and WHATSAPP_PHONE_NUMBER_ID secrets must be set when WHATSAPP_PROVIDER=meta (default)"
              exit 1
            fi
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Read infrastructure outputs from Terraform state
        id: tf_outputs
        shell: bash
        run: |
          # Install Terraform to read outputs from remote state
          wget -qO- https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip \
            | funzip > /usr/local/bin/terraform && chmod +x /usr/local/bin/terraform

          TF_PREFIX="${{ secrets.TF_STATE_PREFIX_GCP }}"
          if [ -z "${TF_PREFIX}" ]; then TF_PREFIX="kasi-connect"; fi
          ENV_SUFFIX="${{ inputs.environment }}"

          # Create a minimal TF config that reads remote state
          TMPDIR=$(mktemp -d)
          cat > "${TMPDIR}/main.tf" <<EOF
          data "terraform_remote_state" "infra" {
            backend = "gcs"
            config = {
              bucket = "${{ secrets.TF_STATE_BUCKET_GCP }}"
              prefix = "${TF_PREFIX}/${ENV_SUFFIX}"
            }
          }
          output "cloud_sql"      { value = data.terraform_remote_state.infra.outputs.cloud_sql }
          output "db_credentials" {
            value     = data.terraform_remote_state.infra.outputs.db_credentials
            sensitive = true
          }
          output "redis"          { value = data.terraform_remote_state.infra.outputs.redis }
          output "asset_bucket"   { value = data.terraform_remote_state.infra.outputs.asset_bucket }
          output "gke_cluster"    { value = data.terraform_remote_state.infra.outputs.gke_cluster }
          EOF

          cd "${TMPDIR}"
          terraform init -input=false -no-color
          terraform refresh -input=false -no-color

          # Extract values (secrets fallback → TF output)
          TF_DB_HOST=$(terraform output -json cloud_sql | jq -r '.private_ip')
          TF_DB_NAME=$(terraform output -json cloud_sql | jq -r '.database')
          TF_DB_USER=$(terraform output -json db_credentials | jq -r '.user')
          TF_DB_PASS=$(terraform output -json db_credentials | jq -r '.password')
          TF_REDIS_HOST=$(terraform output -json redis | jq -r '.host')
          TF_REDIS_PORT=$(terraform output -json redis | jq -r '.port')
          TF_ASSET_BUCKET=$(terraform output -raw asset_bucket)

          # Use secret if set, otherwise use Terraform output
          DB_HOST="${{ secrets.DB_HOST }}";      [ -z "${DB_HOST}" ]      && DB_HOST="${TF_DB_HOST}"
          DB_PORT="${{ secrets.DB_PORT }}";      [ -z "${DB_PORT}" ]      && DB_PORT="5432"
          DB_NAME="${{ secrets.DB_NAME }}";      [ -z "${DB_NAME}" ]      && DB_NAME="${TF_DB_NAME}"
          DB_USER="${{ secrets.DB_USER }}";      [ -z "${DB_USER}" ]      && DB_USER="${TF_DB_USER}"
          DB_PASSWORD="${{ secrets.DB_PASSWORD }}"; [ -z "${DB_PASSWORD}" ] && DB_PASSWORD="${TF_DB_PASS}"
          REDIS_HOST="${{ secrets.REDIS_HOST }}";  [ -z "${REDIS_HOST}" ]  && REDIS_HOST="${TF_REDIS_HOST}"
          REDIS_PORT="${{ secrets.REDIS_PORT }}";  [ -z "${REDIS_PORT}" ]  && REDIS_PORT="${TF_REDIS_PORT}"
          OBS_BUCKET="${{ secrets.OBS_BUCKET }}";  [ -z "${OBS_BUCKET}" ]  && OBS_BUCKET="${TF_ASSET_BUCKET}"

          # Mask sensitive values
          echo "::add-mask::${DB_PASSWORD}"

          # Export to GITHUB_OUTPUT for downstream steps
          {
            echo "db_host=${DB_HOST}"
            echo "db_port=${DB_PORT}"
            echo "db_name=${DB_NAME}"
            echo "db_user=${DB_USER}"
            echo "db_password=${DB_PASSWORD}"
            echo "redis_host=${REDIS_HOST}"
            echo "redis_port=${REDIS_PORT}"
            echo "obs_bucket=${OBS_BUCKET}"
          } >> "$GITHUB_OUTPUT"

          rm -rf "${TMPDIR}"

      - name: Configure Docker for GAR
        shell: bash
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Set image tag
        id: image_tag
        shell: bash
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        shell: bash
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/kasi-connect-backend:${{ steps.image_tag.outputs.tag }}"
          docker build -t "${IMAGE}" ./backend
          docker push "${IMAGE}"
          echo "BACKEND_IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install gke-gcloud-auth-plugin
        shell: bash
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Configure kubeconfig for GKE
        shell: bash
        run: |
          gcloud container clusters get-credentials "${GKE_CLUSTER_NAME}" \
            --region "${GCP_REGION}" \
            --project "${GCP_PROJECT_ID}"

          kubectl cluster-info

      - name: Create namespace
        shell: bash
        run: kubectl apply -f k8s/namespace.yaml

      - name: Deploy Kafka (in-cluster, bitnami)
        shell: bash
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
          # Remove stale release whose StatefulSet spec may conflict with new values
          if helm status kafka --namespace messaging &>/dev/null; then
            helm uninstall kafka --namespace messaging --wait --timeout 2m || true
            kubectl wait --for=delete pod -l app.kubernetes.io/name=kafka \
              --namespace messaging --timeout=60s 2>/dev/null || true
          fi
          helm upgrade --install kafka bitnami/kafka \
            --namespace messaging --create-namespace \
            --set controller.replicaCount=1 \
            --set controller.persistence.enabled=false \
            --set controller.resources.requests.cpu=200m \
            --set controller.resources.requests.memory=256Mi \
            --set controller.resources.limits.cpu=1 \
            --set controller.resources.limits.memory=1Gi \
            --set controller.heapOpts="-Xmx384m -Xms384m" \
            --set broker.replicaCount=0 \
            --set listeners.client.protocol=PLAINTEXT \
            --timeout 10m
          # Don't --wait; Kafka may take a while to start and the backend
          # reconnects automatically. Give it a best-effort check instead.
          echo "Waiting up to 3 min for Kafka pod to become ready..."
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=kafka \
            --namespace messaging --timeout=180s || \
            echo "WARNING: Kafka not ready yet — backend will reconnect automatically"
          # Default to in-cluster broker unless caller already provided a value.
          if [ -z "${{ secrets.KAFKA_BROKERS }}" ]; then
            echo "KAFKA_BROKERS_EFFECTIVE=kafka.messaging.svc.cluster.local:9092" >> "$GITHUB_ENV"
          else
            echo "KAFKA_BROKERS_EFFECTIVE=${{ secrets.KAFKA_BROKERS }}" >> "$GITHUB_ENV"
          fi

      - name: Create backend secrets
        shell: bash
        run: |
          # Build DATABASE_URL from individual DB values if not explicitly provided
          DATABASE_URL="${{ secrets.DATABASE_URL }}"
          if [ -z "${DATABASE_URL}" ]; then
            # URL-encode user and password — the Terraform-generated password
            # may contain @, #, %, etc. which break the connection-URL format.
            ENCODED_USER=$(printf '%s' "${{ steps.tf_outputs.outputs.db_user }}" \
              | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read(),safe=''))")
            ENCODED_PASS=$(printf '%s' "${{ steps.tf_outputs.outputs.db_password }}" \
              | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read(),safe=''))")
            DATABASE_URL="postgresql://${ENCODED_USER}:${ENCODED_PASS}@${{ steps.tf_outputs.outputs.db_host }}:${{ steps.tf_outputs.outputs.db_port }}/${{ steps.tf_outputs.outputs.db_name }}"
          fi
          echo "DATABASE_URL structure: postgresql://<user>:<pass>@${{ steps.tf_outputs.outputs.db_host }}:${{ steps.tf_outputs.outputs.db_port }}/${{ steps.tf_outputs.outputs.db_name }}"
          kubectl create secret generic backend-secrets \
            --namespace=kasi-connect \
            --from-literal=DB_HOST="${{ steps.tf_outputs.outputs.db_host }}" \
            --from-literal=DB_PORT="${{ steps.tf_outputs.outputs.db_port }}" \
            --from-literal=DB_NAME="${{ steps.tf_outputs.outputs.db_name }}" \
            --from-literal=DB_USER="${{ steps.tf_outputs.outputs.db_user }}" \
            --from-literal=DB_PASSWORD="${{ steps.tf_outputs.outputs.db_password }}" \
            --from-literal=DATABASE_URL="${DATABASE_URL}" \
            --from-literal=REDIS_HOST="${{ steps.tf_outputs.outputs.redis_host }}" \
            --from-literal=REDIS_PORT="${{ steps.tf_outputs.outputs.redis_port }}" \
            --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            --from-literal=KAFKA_BROKERS="${KAFKA_BROKERS_EFFECTIVE}" \
            --from-literal=WHATSAPP_PROVIDER="${WHATSAPP_PROVIDER:-meta}" \
            --from-literal=WHATSAPP_VERIFY_TOKEN="${{ secrets.WHATSAPP_VERIFY_TOKEN }}" \
            --from-literal=WHATSAPP_ACCESS_TOKEN="${{ secrets.WHATSAPP_ACCESS_TOKEN }}" \
            --from-literal=WHATSAPP_PHONE_NUMBER_ID="${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}" \
            --from-literal=TWILIO_ACCOUNT_SID="${{ secrets.TWILIO_ACCOUNT_SID }}" \
            --from-literal=TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
            --from-literal=TWILIO_WHATSAPP_FROM="${{ secrets.TWILIO_WHATSAPP_FROM }}" \
            --from-literal=OBS_ENDPOINT="" \
            --from-literal=OBS_BUCKET="${{ steps.tf_outputs.outputs.obs_bucket }}" \
            --from-literal=OBS_ACCESS_KEY="" \
            --from-literal=OBS_SECRET_KEY="" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy backend
        shell: bash
        run: |
          sed "s|BACKEND_IMAGE|${BACKEND_IMAGE}|g" k8s/backend/deployment.yaml | \
            kubectl apply -f -
          kubectl apply -f k8s/backend/service.yaml
          if ! kubectl rollout status deployment/backend --namespace=kasi-connect --timeout=8m; then
            echo "--- Backend rollout failed. Dumping pod info for debugging ---"
            kubectl get pods -n kasi-connect -l app=backend -o wide
            kubectl describe pods -n kasi-connect -l app=backend
            kubectl logs -n kasi-connect -l app=backend --tail=80 || true
            exit 1
          fi

      - name: Discover backend external URL
        id: backend_url
        shell: bash
        run: |
          echo "Waiting for backend LoadBalancer IP..."
          for i in $(seq 1 30); do
            EXTERNAL_IP=$(kubectl get svc backend --namespace=kasi-connect \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
            if [ -n "${EXTERNAL_IP}" ]; then
              break
            fi
            echo "  attempt ${i}/30 — not ready yet"
            sleep 10
          done
          if [ -z "${EXTERNAL_IP}" ]; then
            echo "ERROR: backend LoadBalancer IP not assigned after 5 minutes"
            exit 1
          fi
          API_URL="http://${EXTERNAL_IP}:3000"
          echo "Backend API URL: ${API_URL}"
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        shell: bash
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/kasi-connect-frontend:${{ steps.image_tag.outputs.tag }}"
          docker build --build-arg NEXT_PUBLIC_API_URL="${{ steps.backend_url.outputs.api_url }}" -t "${IMAGE}" ./frontend
          docker push "${IMAGE}"
          echo "FRONTEND_IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Create frontend secrets
        shell: bash
        run: |
          kubectl create secret generic frontend-secrets \
            --namespace=kasi-connect \
            --from-literal=NEXT_PUBLIC_API_URL="${{ steps.backend_url.outputs.api_url }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy frontend
        shell: bash
        run: |
          sed "s|FRONTEND_IMAGE|${FRONTEND_IMAGE}|g" k8s/frontend/deployment.yaml | \
            kubectl apply -f -
          kubectl apply -f k8s/frontend/service.yaml
          kubectl rollout status deployment/frontend --namespace=kasi-connect --timeout=5m
